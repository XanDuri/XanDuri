name: Update TryHackMe Badge

# Why this exists:
# GitHub's image proxy (Camo) often fails to load the TryHackMe S3 badge directly.
# This workflow downloads the badge once a day and commits it into the repo, so the
# README can embed it from raw.githubusercontent.com (which always renders).

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:        # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download TryHackMe badge
        run: |
          mkdir -p assets
          curl -fsSL "https://tryhackme-badges.s3.amazonaws.com/XanDuri.png" -o assets/tryhackme.png

      - name: Commit if the badge changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/tryhackme.png
          if git diff --cached --quiet; then
            echo "No changes to the badge."
          else
            git commit -m "chore: update TryHackMe badge"
            git push
          fi
